name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Annule les runs précédents sur la même branche (économie de minutes Actions)
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      # Aligne npm sur la version qui maintient le lock (npm 11). Sans ca, npm 10
      # resout @swc/helpers differemment et `npm ci` echoue sur un lock pourtant sain.
      - name: Pin npm
        run: npm install -g npm@11

      - name: Install dependencies
        run: npm ci

      - name: Type-check (bloquant)
        run: npx tsc --noEmit

      - name: Lint (bloquant)
        run: npm run lint

      - name: Tests (bloquant)
        run: npm run test:run
